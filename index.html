<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus Company Draft System - Vue Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <!-- Vue.js script -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <!-- The root element for our Vue application -->
    <div id="app">
        <!-- Connection Status Indicator -->
        <div class="connection-status" :class="connectionStatus.class">
            <i class="fas fa-plug"></i>
            <span>{{ connectionStatus.text }}</span>
        </div>

        <!-- Notification Popup -->
        <div class="notification" :class="{ show: notification.show }" :style="{ background: notification.isError ? 'var(--disconnected)' : 'var(--primary)' }">
            {{ notification.text }}
        </div>

        <!-- Rejoin Overlay -->
        <div id="rejoin-overlay" v-if="showRejoinOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2rem; gap: 20px;">
            <i class="fas fa-sync fa-spin"></i>
            <p>Attempting to rejoin lobby...</p>
            <button class="btn btn-secondary" @click="cancelRejoin" style="margin-top: 20px;">Cancel</button>
        </div>

        <!-- Main content is rendered by Vue Router -->
        <main class="container">
             <component 
                :is="currentView.component"
                :state="state"
                :master-i-d-list="masterIDList"
                :master-e-g-o-list="masterEGOList"
                :roster-size="ROSTER_SIZE"
                :ego-ban-count="EGO_BAN_COUNT"
                @navigate="navigate"
                @send-message="sendMessage"
                @show-notification="showNotification"
                @clear-session="clearSessionAndGoHome"
            />
        </main>
    </div>

    <!-- External Data and Main Vue Script -->
    <script src="/data.js"></script>
    <script type="module">
    const { createApp, ref, reactive, computed, onMounted, watch, defineAsyncComponent } = Vue;

    // ================================= //
    //         UTILITY FUNCTIONS         //
    // ================================= //
    
    function createSlug(name) {
        if (!name) return '';
        let slug = name.toLowerCase();
        slug = slug.replace(/ryōshū/g, 'ryshu').replace(/öufi/g, 'ufi');
        slug = slug.replace(/e\.g\.o::/g, 'ego-');
        slug = slug.replace(/ & /g, ' ').replace(/[.'"]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/[^\w-]+/g, '');
        return slug;
    }

    function parseIDCSV(csv) {
        const lines = csv.split('\n').filter(line => line.trim() !== '');
        if (lines.length < 2) return [];
        const regex = /(".*?"|[^",]+)(?=\s*,|\s*$)/g;
        const headers = lines[0].split(',').map(h => h.trim());
        const result = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const values = line.match(regex) || [];
            if (values.length !== headers.length) continue;
            const obj = {};
            headers.forEach((header, idx) => {
                let value = values[idx].trim();
                if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
                obj[header] = value;
            });

            const name = obj.Name;
            const sinnerMatch = name.match(/(Yi Sang|Faust|Don Quixote|Ryōshū|Meursault|Hong Lu|Heathcliff|Ishmael|Rodion|Sinclair|Outis|Gregor)/);
            
            result.push({
                id: createSlug(name), 
                name: name,
                keywords: obj.Keywords ? obj.Keywords.split(',').map(k => k.trim()) : [],
                sinAffinities: obj.SinAffinities ? obj.SinAffinities.split(',').map(s => s.trim()) : [],
                rarity: obj.Rarity,
                imageFile: `${createSlug(name)}.webp`, 
                sinner: sinnerMatch ? sinnerMatch[0] : "Unknown",
            });
        }
        return result;
    }

    function parseEGOData(data) {
        const lines = data.trim().split('\n');
        const egoList = [];
        const bgColorMap = { 
            'Yellow': 'var(--sin-sloth-bg)', 'Blue': 'var(--sin-gloom-bg)', 'Red': 'var(--sin-wrath-bg)',
            'Indigo': 'var(--sin-pride-bg)', 'Purple': 'var(--sin-envy-bg)', 'Orange': 'var(--sin-lust-bg)',
            'Green': 'var(--sin-gluttony-bg)'
        };
        
        lines.forEach(line => {
            if (!line.includes(' - ')) return;
            const parts = line.split(' - ');
            if (parts.length < 4) return;

            const nameAndSinner = parts[0];
            const rarity = parts[1].trim();
            const sin = parts[2].trim();
            const color = parts[3].trim();

            const sinners = ["Yi Sang", "Faust", "Don Quixote", "Ryōshū", "Meursault", "Hong Lu", "Heathcliff", "Ishmael", "Rodion", "Sinclair", "Outis", "Gregor"];
            let sinner = "Unknown";
            let name = nameAndSinner;

            for (const s of sinners) {
                if (nameAndSinner.includes(s)) {
                    sinner = s;
                    name = nameAndSinner.replace(s, '').trim();
                    break;
                }
            }
            
            egoList.push({
                id: createSlug(`${name} ${sinner}`),
                name: `${name} (${sinner})`, sinner, rarity, sin, color,
                cssColor: bgColorMap[color] || 'rgba(128, 128, 128, 0.7)'
            });
        });
        return egoList;
    }
    
    function generateRosterCode(roster, masterList) {
        if (roster.length !== 42) return null;
        try {
            const indices = roster.map(slug => {
                const index = masterList.findIndex(id => id.id === slug);
                return index > -1 ? index : 255; 
            });
            const uint8Array = new Uint8Array(indices);
            const binaryString = String.fromCharCode.apply(null, uint8Array);
            return btoa(binaryString);
        } catch (e) {
            console.error("Error generating roster code:", e);
            return null;
        }
    }

    function loadRosterFromCode(code, masterList) {
        try {
            const binaryString = atob(code);
            if (binaryString.length !== 42) return null;
            const uint8Array = new Uint8Array(binaryString.split('').map(c => c.charCodeAt(0)));
            const rosterSlugs = Array.from(uint8Array).map(index => {
                return (index < masterList.length) ? masterList[index].id : null;
            }).filter(Boolean);

            return rosterSlugs.length === 42 ? rosterSlugs : null;
        } catch (e) {
            console.error("Error decoding roster code:", e);
            return null;
        }
    }


    // ================================= //
    //          VUE COMPONENTS           //
    // ================================= //
    const HomePage = {
        props: ['state'],
        emits: ['navigate', 'sendMessage', 'showNotification'],
        setup(props, { emit }) {
            const createOptions = reactive({
                draftLogic: '1-2-2',
                matchType: 'section1',
                timerEnabled: false,
                isPublic: false
            });
            const joinCode = ref('');

            const playerName = computed({
                get: () => props.state.playerName,
                set: (val) => { props.state.playerName = val; }
            });

            function createLobby() {
                if (!playerName.value) {
                    emit('showNotification', 'Please enter a display name first.', true);
                    return;
                }
                emit('sendMessage', {
                    type: 'createLobby',
                    options: { ...createOptions, name: playerName.value }
                });
            }
            
            function joinLobby() {
                 if (!playerName.value) {
                    emit('showNotification', 'Please enter a display name first.', true);
                    return;
                }
                if (!joinCode.value) {
                    emit('showNotification', 'Please enter a lobby code.', true);
                    return;
                }
                emit('sendMessage', { type: 'joinLobby', lobbyCode: joinCode.value.toUpperCase(), name: playerName.value });
            }

            return {
                createOptions,
                joinCode,
                playerName,
                createLobby,
                joinLobby,
                navigate: (path) => emit('navigate', path)
            };
        },
        template: `
            <div id="main-page">
                <header>
                    <h1><i class="fas fa-dragon"></i> Limbus Company Draft System</h1>
                    <p>Organize and participate in competitive drafting sessions (Vue Edition)</p>
                </header>
                <div class="logo"><i class="fas fa-dragon"></i></div>
                <div class="welcome-text">
                    <p>Welcome to the official Limbus Company drafting system. Here you can create or join lobbies to organize competitive matches with other players, or use the Roster Builder to prepare your teams in advance.</p>
                </div>
                <div class="form-group" style="max-width: 400px; margin: 30px auto; text-align: left;">
                    <label for="player-name">Your Display Name</label>
                    <input type="text" id="player-name" placeholder="Enter your name" v-model="playerName">
                </div>
                <div class="action-container">
                    <div class="action-card">
                        <div class="action-icon"><i class="fas fa-users-cog"></i></div>
                        <h3 class="action-title">Roster Builder</h3>
                        <p class="action-description">Create a 42-ID roster and generate a shareable code for quick loading during a match.</p>
                        <button class="btn btn-secondary btn-large" @click="navigate('/rosterbuilder')"><i class="fas fa-wrench"></i> Open Builder</button>
                    </div>
                    <div class="action-card">
                        <div class="action-icon"><i class="fas fa-plus-circle"></i></div>
                        <h3 class="action-title">Create New Lobby</h3>
                        <p class="action-description">Start a new drafting session as the referee. You'll get a unique lobby code to share with players.</p>
                        <div class="lobby-options">
                            <div class="form-group">
                                <label for="match-type-select">Match Type</label>
                                <select id="match-type-select" v-model="createOptions.matchType">
                                    <option value="section1">Section 1 Only</option>
                                    <option value="allSections">All Sections</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="draft-logic-select">Draft Logic</label>
                                <select id="draft-logic-select" v-model="createOptions.draftLogic">
                                    <option value="1-2-2">Standard (1-2-2)</option>
                                    <option value="2-3-2">Alternate (2-3-2)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="timer-toggle">Enable Timer</label>
                                <select id="timer-toggle" v-model="createOptions.timerEnabled">
                                    <option :value="false">Off</option>
                                    <option :value="true">On</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="public-lobby-toggle">Visibility</label>
                                <select id="public-lobby-toggle" v-model="createOptions.isPublic">
                                    <option :value="false">Private (Code Only)</option>
                                    <option :value="true">Public (In Browser)</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn btn-primary btn-large" @click="createLobby"><i class="fas fa-plus"></i> Create Lobby</button>
                    </div>
                    <div class="action-card" id="join-lobby-card">
                        <div class="action-icon"><i class="fas fa-sign-in-alt"></i></div>
                        <h3 class="action-title">Join a Lobby</h3>
                         <div class="form-group">
                            <label for="lobby-code-input">Lobby Code:</label>
                            <input type="text" id="lobby-code-input" placeholder="Enter 6-character code" maxlength="6" v-model="joinCode">
                        </div>
                        <button class="btn btn-primary" @click="joinLobby"><i class="fas fa-play"></i> Join Lobby</button>
                    </div>
                </div>
            </div>
        `
    };

    const RosterBuilder = {
        props: ['masterIDList', 'rosterSize'],
        emits: ['navigate', 'showNotification'],
        setup(props, { emit }) {
            const SINNER_ORDER = ["Yi Sang", "Faust", "Don Quixote", "Ryōshū", "Meursault", "Hong Lu", "Heathcliff", "Ishmael", "Rodion", "Sinclair", "Outis", "Gregor"];
            const builderRoster = ref([]);
            const selectedSinner = ref(SINNER_ORDER[0]);
            const loadCodeInput = ref('');

            const idsBySinner = computed(() => {
                const grouped = {};
                SINNER_ORDER.forEach(sinner => {
                    grouped[sinner] = props.masterIDList.filter(id => id.sinner === sinner);
                });
                return grouped;
            });

            const displayedIDs = computed(() => idsBySinner.value[selectedSinner.value] || []);
            
            const groupedSelectedRoster = computed(() => {
                const grouped = {};
                const sortedRoster = [...builderRoster.value].sort((a, b) => {
                    const indexA = props.masterIDList.findIndex(item => item.id === a);
                    const indexB = props.masterIDList.findIndex(item => item.id === b);
                    return indexA - indexB;
                });

                sortedRoster.forEach(idSlug => {
                    const idData = props.masterIDList.find(id => id.id === idSlug);
                    if (idData) {
                        if (!grouped[idData.sinner]) grouped[idData.sinner] = [];
                        grouped[idData.sinner].push(idData);
                    }
                });
                return SINNER_ORDER.map(sinner => ({ sinner, ids: grouped[sinner] || [] })).filter(g => g.ids.length > 0);
            });

            const rosterCode = computed(() => {
                if (builderRoster.value.length !== props.rosterSize) {
                    return `Select ${props.rosterSize - builderRoster.value.length} more IDs.`;
                }
                return generateRosterCode(builderRoster.value, props.masterIDList) || "Error generating code.";
            });

            function toggleBuilderIdSelection(id) {
                const index = builderRoster.value.indexOf(id);
                if (index > -1) {
                    builderRoster.value.splice(index, 1);
                } else {
                    if (builderRoster.value.length < props.rosterSize) {
                        builderRoster.value.push(id);
                    } else {
                        emit('showNotification', `You can only select ${props.rosterSize} IDs.`);
                    }
                }
            }
            
            function randomizeRoster() {
                const shuffled = [...props.masterIDList].sort(() => 0.5 - Math.random());
                builderRoster.value = shuffled.slice(0, props.rosterSize).map(id => id.id);
            }

            function clearRoster() {
                builderRoster.value = [];
            }
            
            function copyCode() {
                if (builderRoster.value.length !== props.rosterSize) return;
                navigator.clipboard.writeText(rosterCode.value).then(() => {
                    emit('showNotification', "Roster code copied!");
                }, () => {
                    emit('showNotification', "Failed to copy code.", true);
                });
            }
            
            function loadFromCode() {
                const roster = loadRosterFromCode(loadCodeInput.value, props.masterIDList);
                if (roster) {
                    builderRoster.value = roster;
                    emit('showNotification', "Roster loaded successfully!");
                } else {
                    emit('showNotification', "Invalid roster code.", true);
                }
            }

            return {
                SINNER_ORDER,
                builderRoster,
                selectedSinner,
                loadCodeInput,
                displayedIDs,
                groupedSelectedRoster,
                rosterCode,
                toggleBuilderIdSelection,
                randomizeRoster,
                clearRoster,
                copyCode,
                loadFromCode,
                navigate: (path) => emit('navigate', path)
            };
        },
        template: `
            <div id="roster-builder-page">
                <button class="btn back-button" @click="navigate('/')"><i class="fas fa-arrow-left"></i> Main Menu</button>
                <header>
                    <h1><i class="fas fa-users-cog"></i> Roster Builder</h1>
                    <p>Create a roster and generate a shareable code.</p>
                </header>
                <div class="card">
                    <div class="builder-sinner-nav">
                        <button v-for="sinner in SINNER_ORDER" :key="sinner" class="btn sinner-nav-btn" :class="{ selected: sinner === selectedSinner }" @click="selectedSinner = sinner">
                            {{ sinner }}
                        </button>
                    </div>
                    <div class="builder-content-wrapper">
                        <div class="builder-main-panel">
                            <h3>Available Identities</h3>
                            <div class="builder-id-pool">
                                <div v-for="idData in displayedIDs" :key="idData.id" class="id-item" :class="['rarity-' + idData.rarity, { selected: builderRoster.includes(idData.id) }]" @click="toggleBuilderIdSelection(idData.id)">
                                    <div class="id-icon" :style="{ backgroundImage: 'url(/uploads/' + idData.imageFile + ')' }"></div>
                                    <div class="id-name">{{ idData.name }}</div>
                                </div>
                            </div>
                        </div>
                        <div class="builder-side-panel">
                            <h3>Your Roster ({{ builderRoster.length }}/{{ rosterSize }})</h3>
                            <div class="sinner-grouped-roster">
                                <template v-for="group in groupedSelectedRoster" :key="group.sinner">
                                    <div class="sinner-header"></div>
                                    <div class="sinner-id-container">
                                        <div v-for="idData in group.ids" :key="idData.id" class="id-item" @click="toggleBuilderIdSelection(idData.id)">
                                            <div class="id-icon" :style="{ backgroundImage: 'url(/uploads/' + idData.imageFile + ')' }"></div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div class="controls" style="margin-top: 10px;">
                                <button class="btn" @click="randomizeRoster"><i class="fas fa-random"></i> Random</button>
                                <button class="btn" @click="clearRoster"><i class="fas fa-trash"></i> Clear</button>
                            </div>
                            <h3 style="margin-top: 20px;">Roster Code</h3>
                            <div id="builder-roster-code-display" style="background: #111; padding: 10px; border-radius: 5px; font-family: monospace; min-height: 50px; margin-top: 10px; word-wrap: break-word;">
                                {{ rosterCode }}
                            </div>
                            <button class="btn btn-primary" @click="copyCode" style="width: 100%; margin-top: 10px;" :disabled="builderRoster.length !== rosterSize"><i class="fas fa-copy"></i> Copy Code</button>
                            <h3 style="margin-top: 20px;">Load from Code</h3>
                            <div class="roster-code-actions">
                                <input type="text" v-model="loadCodeInput" placeholder="Paste code here...">
                                <button class="btn" @click="loadFromCode"><i class="fas fa-upload"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `
    };
    
    const Lobby = {
        props: ['state', 'masterIDList', 'masterEGOList', 'rosterSize', 'egoBanCount'],
        emits: ['clearSession', 'sendMessage', 'showNotification'],
        setup(props, { emit }) {
            const p1RosterCode = ref('');
            const p2RosterCode = ref('');

            const lobbyCode = computed(() => props.state.lobbyCode);
            const userRole = computed(() => props.state.userRole);
            const draft = computed(() => props.state.draft || {});
            const participants = computed(() => props.state.participants || {});

            const p1Ready = computed(() => participants.value.p1?.ready && props.state.roster.p1.length === props.rosterSize);
            const p2Ready = computed(() => participants.value.p2?.ready && props.state.roster.p2.length === props.rosterSize);

            function sendMessage(type, payload) {
                emit('sendMessage', { type, lobbyCode: lobbyCode.value, ...payload });
            }

            function setPlayerRoster(player, code) {
                const roster = loadRosterFromCode(code, props.masterIDList);
                if (roster) {
                    sendMessage('rosterSet', { player, roster });
                    emit('showNotification', `${player.toUpperCase()}'s roster loaded!`);
                } else {
                    emit('showNotification', 'Invalid roster code.', true);
                }
            }

            function toggleReady(player) {
                if (props.state.roster[player].length !== props.rosterSize && !participants.value[player].ready) {
                    emit('showNotification', `Must select ${props.rosterSize} IDs.`, true);
                    return;
                }
                sendMessage('updateReady', { player });
            }

            return {
                lobbyCode, userRole, draft, participants, p1Ready, p2Ready,
                p1RosterCode, p2RosterCode,
                clearSession: () => emit('clearSession'),
                sendMessage,
                setPlayerRoster,
                toggleReady,
                loadRosterFromCode: (code) => loadRosterFromCode(code, props.masterIDList)
            }
        },
        template: `
            <div id="lobby-view">
                <button class="btn back-button" @click="clearSession"><i class="fas fa-arrow-left"></i> Main Menu</button>
                <header>
                     <h1><i class="fas fa-dragon"></i> Limbus Company Draft System</h1>
                     <p>Drafting session in progress</p>
                </header>
                <div class="card">
                    <div class="lobby-info">
                        <div>
                            <h3>LOBBY CODE</h3>
                            <div class="code-display">{{ lobbyCode }}</div>
                            <p>Share this code with other participants</p>
                        </div>
                        <div>
                            <h3>PHASE TIMER</h3>
                            <div class="timer-display">--:--</div>
                        </div>
                        <div>
                            <h3>PARTICIPANTS</h3>
                            <div class="participants">
                                <div v-for="(p, role) in participants" :key="role" class="participant" :class="{ 'current-user': userRole === role }">
                                    <i class="fas" :class="role === 'ref' ? 'fa-star' : 'fa-user'"></i>
                                    {{ p.name }} {{ userRole === role ? '(You)' : '' }}
                                    <i v-if="p.status === 'connected'" class="fas fa-check-circle" style="color:var(--connected);"></i>
                                    <i v-else class="fas fa-times-circle" style="color:var(--disconnected);"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Roster Selection Phase -->
                    <div v-if="draft.phase === 'roster'" id="roster-phase" class="phase-section">
                        <h2>Roster Selection Phase</h2>
                        <p>Each player must select 42 IDs. When both are ready, the Referee can start the coin flip.</p>
                        <div class="player-area">
                            <!-- Player 1 Panel -->
                            <div class="player-panel" :class="{ locked: participants.p1?.ready }">
                                <div class="player-header">
                                    <div class="player-name">{{ participants.p1?.name }}</div>
                                    <div class="player-status" :class="participants.p1?.ready ? 'status-ready' : 'status-waiting'">
                                        {{ participants.p1?.ready ? 'Ready' : 'Selecting' }}
                                    </div>
                                </div>
                                <div class="counter"><i class="fas fa-users"></i> Selected: <strong>{{ state.roster.p1.length }}</strong> / {{ rosterSize }} IDs</div>
                                <div class="roster-load-form">
                                    <input type="text" v-model="p1RosterCode" placeholder="Paste Roster Code..." :disabled="userRole !== 'p1' && userRole !== 'ref'">
                                    <button class="btn btn-secondary" @click="setPlayerRoster('p1', p1RosterCode)" :disabled="userRole !== 'p1' && userRole !== 'ref'"><i class="fas fa-upload"></i> Load</button>
                                </div>
                                <div class="roster-selection">
                                   <p class="empty-roster" style="padding: 20px; text-align: center;">ID selection grid would be here.</p>
                                </div>
                                <div class="controls">
                                    <button class="btn" @click="sendMessage('rosterRandomize', { player: 'p1' })" :disabled="userRole !== 'p1' && userRole !== 'ref'"><i class="fas fa-random"></i> Random</button>
                                    <button class="btn" @click="sendMessage('rosterClear', { player: 'p1' })" :disabled="userRole !== 'p1' && userRole !== 'ref'"><i class="fas fa-trash"></i> Clear</button>
                                    <button class="btn" :class="{'btn-ready': participants.p1?.ready}" @click="toggleReady('p1')" :disabled="userRole !== 'p1' && userRole !== 'ref'">
                                        <i class="fas" :class="participants.p1?.ready ? 'fa-times' : 'fa-check'"></i> {{ participants.p1?.ready ? 'Unready' : 'Ready' }}
                                    </button>
                                </div>
                            </div>
                            <!-- Player 2 Panel -->
                             <div class="player-panel" :class="{ locked: participants.p2?.ready }">
                                <div class="player-header">
                                    <div class="player-name">{{ participants.p2?.name }}</div>
                                    <div class="player-status" :class="participants.p2?.ready ? 'status-ready' : 'status-waiting'">
                                        {{ participants.p2?.ready ? 'Ready' : 'Selecting' }}
                                    </div>
                                </div>
                                <div class="counter"><i class="fas fa-users"></i> Selected: <strong>{{ state.roster.p2.length }}</strong> / {{ rosterSize }} IDs</div>
                                <div class="roster-load-form">
                                    <input type="text" v-model="p2RosterCode" placeholder="Paste Roster Code..." :disabled="userRole !== 'p2' && userRole !== 'ref'">
                                    <button class="btn btn-secondary" @click="setPlayerRoster('p2', p2RosterCode)" :disabled="userRole !== 'p2' && userRole !== 'ref'"><i class="fas fa-upload"></i> Load</button>
                                </div>
                                <div class="roster-selection">
                                   <p class="empty-roster" style="padding: 20px; text-align: center;">ID selection grid would be here.</p>
                                </div>
                                <div class="controls">
                                    <button class="btn" @click="sendMessage('rosterRandomize', { player: 'p2' })" :disabled="userRole !== 'p2' && userRole !== 'ref'"><i class="fas fa-random"></i> Random</button>
                                    <button class="btn" @click="sendMessage('rosterClear', { player: 'p2' })" :disabled="userRole !== 'p2' && userRole !== 'ref'"><i class="fas fa-trash"></i> Clear</button>
                                    <button class="btn" :class="{'btn-ready': participants.p2?.ready}" @click="toggleReady('p2')" :disabled="userRole !== 'p2' && userRole !== 'ref'">
                                        <i class="fas" :class="participants.p2?.ready ? 'fa-times' : 'fa-check'"></i> {{ participants.p2?.ready ? 'Unready' : 'Ready' }}
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="ref-actions" style="text-align: center; margin-top: 20px;">
                            <button class="btn btn-primary btn-large" @click="sendMessage('startCoinFlip')" :disabled="userRole !== 'ref' || !p1Ready || !p2Ready">
                                <i class="fas fa-coins"></i> Start Coin Flip
                            </button>
                        </div>
                    </div>

                    <!-- Other phases would be implemented with v-else-if -->
                    <div v-else>
                        <h2>{{ draft.phase }} Phase</h2>
                        <p>This phase is not yet fully implemented in the UI.</p>
                         <pre style="text-align: left; background: #111; padding: 10px; border-radius: 5px; max-height: 400px; overflow: auto;">{{ JSON.stringify(state, null, 2) }}</pre>
                    </div>
                </div>
            </div>
        `
    };

    // ================================= //
    //          VUE APPLICATION          //
    // ================================= //

    const app = createApp({
        setup() {
            // ================================= //
            //         REACTIVE STATE            //
            // ================================= //
            const ROSTER_SIZE = 42;
            const EGO_BAN_COUNT = 5;
            const masterIDList = ref(parseIDCSV(window.idCsvData));
            const masterEGOList = ref(parseEGOData(window.egoData));

            const state = reactive({
                lobbyCode: null,
                userRole: null,
                rejoinToken: null,
                playerName: localStorage.getItem('limbusPlayerName') || '',
                participants: {
                    p1: { name: "Player 1", status: "disconnected", ready: false },
                    p2: { name: "Player 2", status: "disconnected", ready: false },
                    ref: { name: "Referee", status: "disconnected" }
                },
                roster: { p1: [], p2: [] },
                draft: {}, // Will be populated by server
            });

            const connectionStatus = ref({ class: '', text: 'Disconnected' });
            const notification = reactive({ show: false, text: '', isError: false });
            const showRejoinOverlay = ref(false);
            let socket = null;
            let rejoinTimeout = null;

            // ================================= //
            //         ROUTER LOGIC              //
            // ================================= //
            const routes = {
                '/': { component: HomePage },
                '/rosterbuilder': { component: RosterBuilder },
                '/lobby': { component: Lobby } // Base for lobby routes
            };

            const currentPath = ref(window.location.pathname);
            
            const currentView = computed(() => {
                const path = currentPath.value;
                if (path.startsWith('/lobby/')) {
                    return routes['/lobby'];
                }
                return routes[path] || routes['/']; // Fallback to HomePage
            });

            window.addEventListener('popstate', () => {
                currentPath.value = window.location.pathname;
            });
            
            function navigate(path) {
                window.history.pushState({}, '', path);
                currentPath.value = path;
            }

            // ================================= //
            //        WEBSOCKET LOGIC            //
            // ================================= //
            function sendMessage(message) {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify(message));
                }
            }

            function connectWebSocket() {
                const loc = window.location;
                const wsProtocol = loc.protocol === 'https:' ? 'wss:' : 'ws:';
                const remoteUrl = `${wsProtocol}//${loc.host}/`;
                socket = new WebSocket(remoteUrl);

                connectionStatus.value = { class: 'connecting', text: 'Connecting...' };

                socket.onopen = () => {
                    connectionStatus.value = { class: 'connected', text: 'Connected' };
                    const session = JSON.parse(localStorage.getItem('limbusDraftSession'));
                    if (session && session.lobbyCode && session.userRole && session.rejoinToken) {
                        showRejoinOverlay.value = true;
                        sendMessage({ 
                            type: 'rejoinLobby', 
                            lobbyCode: session.lobbyCode,
                            role: session.userRole,
                            rejoinToken: session.rejoinToken
                        });
                        rejoinTimeout = setTimeout(() => {
                            if (showRejoinOverlay.value) {
                                cancelRejoin();
                                showNotification('Failed to rejoin lobby. Session might have expired.', true);
                            }
                        }, 10000);
                    }
                };

                socket.onmessage = (event) => handleServerMessage(JSON.parse(event.data));
                
                socket.onclose = () => {
                    connectionStatus.value = { class: '', text: 'Disconnected' };
                };

                socket.onerror = (error) => console.error('WebSocket error:', error);
            }

            function handleServerMessage(message) {
                console.log("Received:", message);
                switch (message.type) {
                    case 'lobbyCreated':
                    case 'lobbyJoined':
                        handleLobbyJoined(message);
                        break;
                    case 'stateUpdate':
                        handleStateUpdate(message.state);
                        break;
                    case 'notification':
                        showNotification(message.text, message.isError);
                        break;
                    case 'error':
                        showNotification(`Error: ${message.message}`, true);
                        if (message.message.includes('rejoin')) {
                           cancelRejoin();
                        }
                        break;
                }
            }
            
            function handleLobbyJoined(message) {
                if (rejoinTimeout) clearTimeout(rejoinTimeout);
                showRejoinOverlay.value = false;

                state.lobbyCode = message.lobbyCode || message.code;
                state.userRole = message.role;
                state.rejoinToken = message.rejoinToken;

                if (state.rejoinToken) {
                    localStorage.setItem('limbusDraftSession', JSON.stringify({
                        lobbyCode: state.lobbyCode,
                        userRole: state.userRole,
                        rejoinToken: state.rejoinToken
                    }));
                }
                handleStateUpdate(message.state);
                navigate(`/lobby/${state.lobbyCode}`);
            }

            function handleStateUpdate(newState) {
                Object.assign(state.participants, newState.participants);
                Object.assign(state.roster, newState.roster);
                state.draft = newState.draft; // Replace draft state entirely
            }
            
            function cancelRejoin() {
                if (rejoinTimeout) clearTimeout(rejoinTimeout);
                localStorage.removeItem('limbusDraftSession');
                showRejoinOverlay.value = false;
            }

            // ================================= //
            //         GENERAL METHODS           //
            // ================================= //
            function showNotification(text, isError = false) {
                notification.text = text;
                notification.isError = isError;
                notification.show = true;
                setTimeout(() => { notification.show = false; }, 3000);
            }
            
            function clearSessionAndGoHome() {
                localStorage.removeItem('limbusDraftSession');
                state.lobbyCode = null;
                state.userRole = null;
                state.rejoinToken = null;
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.close();
                }
                Object.assign(state.participants, { p1: {name: "P1"}, p2: {name: "P2"}, ref: {name: "Ref"} });
                state.roster = { p1: [], p2: [] };
                state.draft = {};
                navigate('/');
                setTimeout(connectWebSocket, 100);
            }

            watch(() => state.playerName, (newName) => {
                localStorage.setItem('limbusPlayerName', newName);
            });

            // ================================= //
            //         LIFECYCLE HOOKS           //
            // ================================= //
            onMounted(() => {
                connectWebSocket();
                const path = window.location.pathname;
                if (path.startsWith('/lobby/')) {
                    const lobbyCodeFromUrl = path.split('/')[2].toUpperCase();
                    const session = JSON.parse(localStorage.getItem('limbusDraftSession'));
                    if (!session || session.lobbyCode !== lobbyCodeFromUrl) {
                        showNotification('You are not part of this lobby. Redirecting home.', true);
                        navigate('/');
                    } else {
                        state.lobbyCode = lobbyCodeFromUrl;
                    }
                }
            });

            return {
                state, masterIDList, masterEGOList,
                connectionStatus, notification, showRejoinOverlay,
                ROSTER_SIZE, EGO_BAN_COUNT,
                currentView, navigate,
                sendMessage, showNotification, cancelRejoin, clearSessionAndGoHome
            };
        },
    });

    app.mount('#app');
    </script>
</body>
</html>
